<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080a;--bg-card:#111114;--bg-elevated:#19191d;--border:#222228;
  --text:#eae8e3;--text-secondary:#8a8880;
  --accent:oklch(0.75 0.15 70);--accent-glow:oklch(0.75 0.15 70 / 0.15);--accent-dim:oklch(0.55 0.10 70);
  --mono:'JetBrains Mono',monospace;--heading:'DM Sans',sans-serif;--body:'IBM Plex Sans',sans-serif;
}
html{scroll-behavior:smooth;background:var(--bg);color:var(--text);font-family:var(--body);font-weight:400;line-height:1.65;font-size:16px}
body{overflow-x:hidden;background:var(--bg)}
a{color:inherit;text-decoration:none}
::selection{background:oklch(0.75 0.15 70 / 0.3);color:#fff}

.container{max-width:1120px;margin:0 auto;padding:0 20px}
@media(min-width:640px){.container{padding:0 32px}}

.section-label{font-family:var(--mono);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::before{content:'//';opacity:0.5}
.section-title{font-family:var(--heading);font-size:clamp(24px,5vw,40px);font-weight:700;line-height:1.2;margin-bottom:16px;color:var(--text)}
section{padding:72px 0;position:relative}
@media(min-width:768px){section{padding:100px 0}}

.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(234,232,227,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(234,232,227,0.02) 1px,transparent 1px);
  background-size:60px 60px}
.grid-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,oklch(0.75 0.15 70 / 0.06),transparent)}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes spin-slow{from{transform:rotateY(0) rotateX(15deg)}to{transform:rotateY(360deg) rotateX(15deg)}}
@keyframes pulse-glow{0%,100%{opacity:0.3}50%{opacity:0.7}}
@keyframes text-reveal{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}

/* Mobile nav drawer */
.mobile-menu{display:none;position:fixed;inset:0;z-index:99;background:rgba(8,8,10,0.97);
  backdrop-filter:blur(16px);flex-direction:column;align-items:center;justify-content:center;gap:36px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:var(--heading);font-size:28px;font-weight:600;color:var(--text-secondary);transition:color 0.2s}
.mobile-menu a:hover{color:var(--text)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all 0.3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:767px){.hamburger{display:flex}.desktop-nav{display:none!important}}

/* Hero responsive */
.hero-grid{display:grid;grid-template-columns:1fr auto;align-items:center;gap:40px}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr}.hero-3d{display:none!important}}

/* Services / Projects grids */
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
@media(max-width:480px){.services-grid,.projects-grid{grid-template-columns:1fr}}

/* Project cards equal height */
.projects-grid{align-items:stretch}
.projects-grid .reveal-wrap{height:100%}
.project-card{height:100%;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;transition:border-color 0.3s,box-shadow 0.3s;cursor:default}
.project-card:hover{border-color:oklch(0.75 0.15 70 / 0.4);box-shadow:0 0 32px oklch(0.75 0.15 70 / 0.08)}
.project-card-accent{height:3px;background:linear-gradient(90deg,var(--accent),transparent)}
.project-card-body{padding:24px;display:flex;flex-direction:column;flex:1;gap:12px}
.project-card-num{font-family:var(--mono);font-size:11px;color:var(--accent);opacity:0.6;letter-spacing:0.1em}
.project-card-title{font-family:var(--heading);font-weight:600;font-size:clamp(15px,2vw,18px);color:var(--text);line-height:1.3}
.project-card-subtitle{font-family:var(--mono);font-size:11px;color:var(--accent);line-height:1.5}
.project-card-details{display:grid;gap:10px;flex:1}
.project-card-detail{display:grid;gap:4px}
.project-card-detail-label,.project-card-stack-label{font-family:var(--mono);font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.08em}
.project-card-detail-text{font-size:clamp(12px,1.5vw,13px);font-weight:300;color:var(--text-secondary);line-height:1.65}
.project-card-footer{display:flex;flex-direction:column;align-items:flex-start;gap:10px;margin-top:4px}
.project-card-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;width:100%}
.project-card-tags{display:flex;flex-wrap:wrap;gap:6px}
.project-card-tag{font-family:var(--mono);font-size:10px;color:var(--accent);background:oklch(0.75 0.15 70 / 0.08);padding:3px 9px;border-radius:5px;border:1px solid oklch(0.75 0.15 70 / 0.12);letter-spacing:0.02em}
.project-card-status{font-family:var(--mono);font-size:10px;font-weight:600;color:#08080a;background:var(--accent);padding:3px 10px;border-radius:5px;white-space:nowrap}
.project-card-actions{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.project-card-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);border:1px solid oklch(0.75 0.15 70 / 0.25);padding:4px 12px;border-radius:6px;transition:background 0.2s,border-color 0.2s;white-space:nowrap}
.project-card-link:hover{background:oklch(0.75 0.15 70 / 0.1);border-color:oklch(0.75 0.15 70 / 0.5)}
.project-card-private{font-family:var(--mono);font-size:10px;color:var(--text-secondary);border:1px dashed var(--border);padding:4px 10px;border-radius:6px;white-space:nowrap}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 12;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, offsetRef.current.x), Math.max(PAD, window.innerWidth - w - PAD)),
      y: Math.min(Math.max(PAD, offsetRef.current.y), Math.max(PAD, window.innerHeight - h - PAD)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };

  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight-(ev.clientX-sx), y: startBottom-(ev.clientY-sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, title, children }) {
  return <><div className="twk-sect">{label || title}</div>{children}</>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value); valueRef.current = value;
  const segAt = (cx) => {
    const r = trackRef.current.getBoundingClientRect();
    return opts[Math.max(0, Math.min(n-1, Math.floor(((cx-r.left-2)/(r.width-4))*n)))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = ev => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left:`calc(2px + ${idx} * (100% - 4px) / ${n})`, width:`calc((100% - 4px) / ${n})` }} />
        {opts.map(o => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

const LangContext = React.createContext('en');
function useT() { return T[React.useContext(LangContext)]; }

function useMousePosition() {
  const [pos, setPos] = useState({ x: 0.5, y: 0.5 });
  useEffect(() => {
    const h = e => setPos({ x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight });
    window.addEventListener('mousemove', h, { passive: true });
    return () => window.removeEventListener('mousemove', h);
  }, []);
  return pos;
}

function useReveal(threshold = 0.1) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, style = {}, className = '' }) {
  const [ref, visible] = useReveal();
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(28px)',
      transition: `opacity 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}ms, transform 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}ms`,
      ...style
    }} className={className}>{children}</div>
  );
}

function TiltCard({ children, style = {}, className = '' }) {
  const cardRef = useRef(null);
  const [transform, setTransform] = useState('perspective(800px) rotateX(0) rotateY(0)');
  const [glare, setGlare] = useState({ x: 50, y: 50, opacity: 0 });
  const isMobile = window.innerWidth < 768;
  const handleMove = useCallback(e => {
    if (isMobile) return;
    const rect = cardRef.current.getBoundingClientRect();
    const x = (e.clientX-rect.left)/rect.width, y = (e.clientY-rect.top)/rect.height;
    setTransform(`perspective(800px) rotateX(${(0.5-y)*10}deg) rotateY(${(x-0.5)*10}deg) scale3d(1.02,1.02,1.02)`);
    setGlare({ x: x*100, y: y*100, opacity: 0.1 });
  }, [isMobile]);
  const handleLeave = useCallback(() => {
    setTransform('perspective(800px) rotateX(0) rotateY(0) scale3d(1,1,1)');
    setGlare({ x: 50, y: 50, opacity: 0 });
  }, []);
  return (
    <div ref={cardRef} onMouseMove={handleMove} onMouseLeave={handleLeave} className={className}
      style={{ transform, transition: 'transform 0.4s cubic-bezier(0.16,1,0.3,1)', transformStyle: 'preserve-3d', position: 'relative', overflow: 'hidden', ...style }}>
      {children}
      <div style={{ position:'absolute', inset:0, pointerEvents:'none', borderRadius:'inherit',
        background: `radial-gradient(circle at ${glare.x}% ${glare.y}%, rgba(255,255,255,${glare.opacity}), transparent 60%)` }}></div>
    </div>
  );
}

function Particles({ count = 20 }) {
  const particles = useMemo(() => Array.from({ length: count }, (_, i) => ({
    id: i, x: Math.random()*100, y: Math.random()*100, size: 2+Math.random()*2.5,
    dur: 15+Math.random()*25, delay: Math.random()*-20, opacity: 0.12+Math.random()*0.2
  })), [count]);
  return (
    <div style={{ position:'fixed', inset:0, zIndex:1, pointerEvents:'none', overflow:'hidden' }}>
      {particles.map(p => (
        <div key={p.id} style={{ position:'absolute', left:`${p.x}%`, top:`${p.y}%`, width:p.size, height:p.size, borderRadius:'50%',
          background:'var(--accent)', opacity:p.opacity, animation:`float ${p.dur}s ease-in-out ${p.delay}s infinite` }}></div>
      ))}
    </div>
  );
}

          left:137+c[0]*90, top:137+c[1]*90, transform:`translateZ(${c[2]*90}px)`, animation:`pulse-glow 3s ease-in-out ${i*0.3}s infinite` }}></div>

function LangSwitcher({ lang, setLang }) {
  const langs = ['en','ar','tr'];
  const labels = { en:'EN', ar:'ع', tr:'TR' };
  return (
    <div style={{ display:'flex', gap:3, background:'var(--bg-elevated)', borderRadius:8, padding:3, border:'1px solid var(--border)' }}>
      {langs.map(l => (
        <button key={l} onClick={() => setLang(l)} style={{
          background: lang===l ? 'var(--accent)' : 'transparent', color: lang===l ? '#08080a' : 'var(--text-secondary)',
          border:'none', borderRadius:6, padding:'4px 10px', cursor:'pointer',
          fontFamily: l==='ar' ? 'var(--body)' : 'var(--mono)', fontSize:12, fontWeight:600, transition:'all 0.2s'
        }}>{labels[l]}</button>
      ))}
    </div>
  );
}

function Nav({ lang, setLang }) {
  const t = useT();
  const [scrolled, setScrolled] = useState(false);
  const [active, setActive] = useState('hero');
  const [menuOpen, setMenuOpen] = useState(false);
  const navIds = ['hero','about','services','projects','contact'];

  useEffect(() => {
    const h = () => {
      setScrolled(window.scrollY > 40);
      for (let i = navIds.length-1; i >= 0; i--) {
        const el = document.getElementById(navIds[i]);
        if (el && el.getBoundingClientRect().top <= 200) { setActive(navIds[i]); break; }
      }
    };
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);

  useEffect(() => {
    document.body.style.overflow = menuOpen ? 'hidden' : '';
  }, [menuOpen]);

  const closeMenu = () => setMenuOpen(false);

  return (
    <>
      <nav style={{ position:'fixed',top:0,left:0,right:0,zIndex:100,
        background: scrolled ? 'rgba(8,8,10,0.92)' : 'transparent',
        backdropFilter: scrolled ? 'blur(16px) saturate(1.5)' : 'none',
        borderBottom: scrolled ? '1px solid rgba(255,255,255,0.06)' : '1px solid transparent',
        transition:'all 0.4s cubic-bezier(0.16,1,0.3,1)', padding:'0 20px' }}>
        <div style={{ maxWidth:1120,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center',height:60 }}>
          <a href="#hero" style={{ fontFamily:'var(--heading)',fontWeight:700,fontSize:17, zIndex:101 }}>
            Fares<span style={{ color:'var(--accent)' }}> </span>Awarik
          </a>
          <div className="desktop-nav" style={{ display:'flex',gap:20,fontSize:14,fontWeight:500,fontFamily:'var(--body)',alignItems:'center' }}>
            {navIds.map((id,i) => (
              <a key={id} href={`#${id}`} style={{ color: active===id ? 'var(--accent)' : 'var(--text-secondary)', transition:'color 0.3s', position:'relative', padding:'4px 0' }}>
                {t.navItems[i]}
                {active===id && <span style={{ position:'absolute',bottom:-2,left:0,right:0,height:2,background:'var(--accent)',borderRadius:1 }}></span>}
              </a>
            ))}
            <LangSwitcher lang={lang} setLang={setLang} />
          </div>
          <button className={`hamburger${menuOpen?' open':''}`} onClick={() => setMenuOpen(v => !v)} aria-label="Menu" style={{ zIndex:101 }}>
            <span></span><span></span><span></span>
          </button>
        </div>
      </nav>

      <div className={`mobile-menu${menuOpen?' open':''}`}>
        {navIds.map((id,i) => (
          <a key={id} href={`#${id}`} onClick={closeMenu}>{t.navItems[i]}</a>
        ))}
        <LangSwitcher lang={lang} setLang={setLang} />
      </div>
    </>
  );
}

function Hero() {

                {t.hello}
              </p>
            </div>
            <div style={anim(0.2)}>
              <h1 style={{ maxWidth:700,fontFamily:'var(--heading)',fontSize:'clamp(38px,7vw,64px)',fontWeight:700,lineHeight:1.05,marginBottom:12,
                background:'linear-gradient(135deg, var(--text) 0%, var(--accent) 100%)',
                WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text' }}>{t.name}</h1>
            </div>
            <div style={anim(0.5)}>
              <p style={{ maxWidth:480,color:'var(--text)',opacity:0.82,fontSize:'clamp(14px,2vw,17px)',fontWeight:300,lineHeight:1.75,marginBottom:36 }}>{t.heroDesc}</p>
            </div>
            <div style={{ display:'flex',gap:12,flexWrap:'wrap',marginBottom:40,...anim(0.6) }}>
              <a href="#contact" style={{
                background:'var(--accent)',color:'#08080a',padding:'13px 28px',borderRadius:10,fontWeight:600,fontSize:15,fontFamily:'var(--heading)',
                boxShadow:'0 0 30px var(--accent-glow)', display:'inline-block'
              }}>{t.viewProjects}</a>
              <a href="#projects" style={{ border:'1px solid var(--border)',color:'var(--text)',padding:'13px 28px',borderRadius:10,fontWeight:500,fontSize:15,
                fontFamily:'var(--heading)',background:'rgba(255,255,255,0.02)', display:'inline-block' }}
              >{t.contactMe}</a>
            </div>
            <div style={{ display:'flex',flexWrap:'wrap',gap:'6px 16px',fontFamily:'var(--mono)',fontSize:12,color:'var(--text)',opacity:0.82,...anim(0.75) }}>
              {t.serviceTags.map((s,i) => (
                <span key={i} style={{ display:'flex',alignItems:'center',gap:6 }}>
                  {i>0 && <span style={{ color:'var(--accent)',opacity:0.4 }}>•</span>}{s}
                </span>
              ))}
            </div>
            <div style={{ fontFamily:'var(--mono)',fontSize:12,color:'var(--text)',opacity:0.72,marginTop:12,...anim(0.8) }}>
              {t.trustLine}
            </div>
          </div>
          <div style={{ perspective:800,display:'flex',alignItems:'center',justifyContent:'center' }} className="hero-3d">
            <WireframeShape mouse={mouse} />
          </div>
        </div>
      </div>
    </section>
  );
}

function Services() {

function ProjectCard({ title, subtitle, problem, built, role, result, tags, status, liveUrl, githubUrl, sourceLabel, index }) {
  const [hovered, setHovered] = useState(false);
  const t = useT();
  const labels = t.projectLabels || {};
  const details = [
    [labels.problem || 'Problem / goal', problem],
    [labels.built || 'What I built', built],
    [labels.role || 'My role', role],
    [labels.result || 'Result / status', result],
  ].filter(([, value]) => value);
  return (
    <Reveal delay={index*80} style={{ height:'100%' }} className="reveal-wrap">
      <div
        className="project-card"
        onMouseEnter={() => setHovered(true)}
        onMouseLeave={() => setHovered(false)}
      >
        <div className="project-card-accent" style={{
          background: hovered
            ? 'linear-gradient(90deg, var(--accent), oklch(0.75 0.15 70 / 0.3))'
            : 'linear-gradient(90deg, oklch(0.75 0.15 70 / 0.3), transparent)',
          transition: 'background 0.4s'
        }} />
        <div className="project-card-body">
          <span className="project-card-num">// {String(index+1).padStart(2,'0')}</span>
          <h3 className="project-card-title">{title}</h3>
          {subtitle && <p className="project-card-subtitle">{subtitle}</p>}
          <div className="project-card-details">
            {details.map(([label, value]) => (
              <div className="project-card-detail" key={label}>
                <span className="project-card-detail-label">{label}</span>
                <p className="project-card-detail-text">{value}</p>
              </div>
            ))}
          </div>
          <div className="project-card-footer">
            <div className="project-card-meta">
              <span className="project-card-stack-label">{labels.stack || 'Tech stack'}</span>
              <div className="project-card-tags">
                {tags.map(tag => <span key={tag} className="project-card-tag">{tag}</span>)}
              </div>
              {status && <span className="project-card-status">{status}</span>}
            </div>
            <div className="project-card-actions">
              {liveUrl && <a href={liveUrl} target="_blank" rel="noopener noreferrer" className="project-card-link">{t.projectLiveLabel}</a>}
              {githubUrl && <a href={githubUrl} target="_blank" rel="noopener noreferrer" className="project-card-link">{t.projectGithubLabel}</a>}
              {sourceLabel && <span className="project-card-private">{sourceLabel}</span>}
            </div>
          </div>
        </div>
      </div>
    </Reveal>
  );
}

function Projects() {

      <p style={{ fontFamily:'var(--mono)',fontSize:11,color:'var(--text-secondary)' }}>{t.footer}</p>
    </footer>
  );

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const lang = tweaks.lang || 'en';
  const isRtl = lang === 'ar';

  useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
  }, [lang, isRtl]);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', `oklch(0.75 0.15 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-dim', `oklch(0.55 0.10 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-glow', `oklch(0.75 0.15 ${tweaks.accentHue} / 0.15)`);
  }, [tweaks.accentHue]);

  return (
    <LangContext.Provider value={lang}>
      {tweaks.showParticles && <Particles count={20} />}
      <Nav lang={lang} setLang={v => setTweak('lang', v)} />
      <Hero />
      <About />
      <Services />
      <Projects />
      <TechStack />
      <Contact />
      <Footer />
      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakSlider label="Accent Hue" value={tweaks.accentHue} onChange={v => setTweak('accentHue', v)} min={0} max={360} step={1} />
          <TweakToggle label="Particles" value={tweaks.showParticles} onChange={v => setTweak('showParticles', v)} />
        </TweakSection>
        <TweakSection title="Language">
          <TweakRadio label="Language" value={lang} onChange={v => setTweak('lang', v)} options={['en','ar','tr']} />
        </TweakSection>
      </TweaksPanel>
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
